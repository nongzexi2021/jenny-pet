name: Build Mac App
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装依赖
        run: npm install
      - name: 打包
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: 上传 Apple Silicon 版本
        uses: actions/upload-artifact@v4
        with:
          name: Jenny的小伙伴-M芯片
          path: dist/*arm64*.dmg
