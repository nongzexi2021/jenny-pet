
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: transparent;
  overflow: hidden;
}
body {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 8px 0 4px;
  font-family: -apple-system, 'PingFang SC', sans-serif;
  user-select: none;
  width: 260px;
}

.top-slot {
  display: flex; align-items: center; justify-content: center;
  min-height: 22px; margin-bottom: 2px; width: 100%;
  -webkit-app-region: drag;
}
.weather-bar { font-size: 11px; color: #aaa; text-align: center; line-height: 1; transition: color 0.5s; }
.weather-bar.loaded { color: #c2547e; }
.bubble {
  display: none; background: white; border: 2px solid #f9a8c9;
  border-radius: 14px; padding: 7px 12px; font-size: 12px; color: #c2547e;
  text-align: center; max-width: 220px; line-height: 1.5;
  white-space: pre-line; position: relative;
}
.bubble::after {
  content: ''; position: absolute; bottom: -9px; left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: #f9a8c9;
}
.bubble.show { display: block; }

canvas { cursor: grab; display: block; -webkit-app-region: drag; }
canvas:active { cursor: grabbing; }

.timer { font-size: 11px; color: #ddd; text-align: center; margin-top: 2px; line-height: 1; transition: color 0.3s; -webkit-app-region: drag; }
.timer.focus { color: #e07090; }
.timer.relax { color: #70b0d8; }

/* 面板区域：收起时高度为0 */
.panel-area {
  width: 100%;
  overflow: hidden;
  transition: max-height 0.25s ease;
  max-height: 0;
  -webkit-app-region: no-drag;
}
.panel-area.open { max-height: 500px; }

.state-panel {
  display: flex; flex-direction: column; gap: 7px;
  background: white; border: 1.5px solid #f0d0e0; border-radius: 16px;
  padding: 12px 14px; margin: 6px 10px 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.panel-title { font-size: 11px; color: #bbb; text-align: center; margin-bottom: 2px; }
.state-btn {
  border: 1.5px solid #f0c0d8; border-radius: 11px; padding: 8px 0;
  font-size: 13px; font-family: -apple-system,'PingFang SC',sans-serif;
  cursor: pointer; text-align: center; background: #fff9fc; color: #c2547e;
  transition: background 0.2s; width: 100%;
}
.state-btn:hover { background: #ffe0ee; }
.state-btn:active { transform: scale(0.97); }
.state-btn.active { background: #f9a8c9; color: white; border-color: #f9a8c9; }

.chat-panel {
  display: flex; flex-direction: column; gap: 8px;
  background: white; border: 1.5px solid #f0d0e0; border-radius: 16px;
  padding: 12px 14px; margin: 6px 10px 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.chat-title { font-size: 11px; color: #bbb; text-align: center; }
.chat-history {
  overflow-y: auto; display: flex; flex-direction: column;
  gap: 6px; max-height: 180px;
}
.chat-msg {
  font-size: 12px; line-height: 1.5; border-radius: 10px;
  padding: 6px 10px; max-width: 88%; word-break: break-all;
}
.chat-msg.user { background: #fff0f5; color: #c2547e; align-self: flex-end; border: 1px solid #f9a8c9; }
.chat-msg.ai   { background: #f8f8f8; color: #444; align-self: flex-start; border: 1px solid #eee; }
.confirm-card {
  background: #fff8fc; border: 1.5px solid #f9a8c9; border-radius: 10px;
  padding: 7px 10px; font-size: 12px; color: #555; align-self: stretch;
}
.confirm-card .confirm-title { font-weight: bold; color: #c2547e; margin-bottom: 3px; }
.confirm-card .confirm-detail { color: #777; font-size: 11px; line-height: 1.6; }
.confirm-card .confirm-status { color: #4caf50; font-size: 11px; margin-top: 3px; }
.confirm-card .confirm-status.error { color: #e57373; }

.chat-input-row { display: flex; gap: 5px; align-items: center; }
.chat-input {
  flex: 1; border: 1.5px solid #f0c0d8; border-radius: 10px;
  padding: 6px 10px; font-size: 12px;
  font-family: -apple-system,'PingFang SC',sans-serif; color: #555; outline: none;
}
.chat-input:focus { border-color: #f9a8c9; }
.chat-send {
  background: #f9a8c9; border: none; border-radius: 10px;
  padding: 6px 10px; font-size: 12px; color: white; cursor: pointer;
}
.chat-send:hover { background: #e07090; }

.voice-btn {
  width: 100%; border: 1.5px solid #f0c0d8; border-radius: 10px;
  padding: 8px 0; font-size: 13px;
  font-family: -apple-system,'PingFang SC',sans-serif;
  background: #fff9fc; color: #c2547e; cursor: pointer;
  text-align: center; user-select: none; transition: background 0.2s;
}
.voice-btn.recording { background: #f9a8c9; color: white; animation: pulse 0.8s infinite alternate; }
@keyframes pulse { from{opacity:1;} to{opacity:0.7;} }
.chat-footer { font-size: 11px; color: #ccc; text-align: center; cursor: pointer; }
.chat-footer:hover { color: #999; }
</style>
</head>
<body>

<div class="top-slot">
  <div class="weather-bar" id="weather-bar">正在获取天气...</div>
  <div class="bubble" id="bubble"></div>
</div>

<canvas id="c" width="150" height="150"></canvas>
<div class="timer" id="timer"></div>

<!-- 面板区域：默认收起，展开时撑高窗口 -->
<div class="panel-area" id="panel-area">

  <!-- 状态选择面板 -->
  <div class="state-panel" id="panel" style="display:none">
    <div class="panel-title">Jenny，今天怎么样？</div>
    <button class="state-btn" id="btn-focus" onclick="selectState('focus')">📚 专注学习</button>
    <button class="state-btn" id="btn-relax" onclick="selectState('relax')">🌿 放松休息</button>
    <button class="state-btn" id="btn-today" onclick="queryToday()">📅 今天的安排</button>
    <button class="state-btn" id="btn-chat" onclick="openChat()">💬 和我说话</button>
    <button class="state-btn" id="btn-memo" onclick="openMemo()">📝 语音备忘录</button>
  </div>

  <!-- 聊天面板 -->
  <div class="chat-panel" id="chat-panel" style="display:none">
    <div class="chat-title">✨ 和小伙伴说说吧～</div>
    <div class="chat-history" id="chat-history"></div>
    <button class="voice-btn" id="voice-btn"
      onmousedown="startVoice('chat')" onmouseup="stopVoice('chat')"
      ontouchstart="startVoice('chat')" ontouchend="stopVoice('chat')">
      🎤 按住说话
    </button>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="或者打字..." maxlength="200"
        onkeydown="if(event.key==='Enter')sendText()" />
      <button class="chat-send" onclick="sendText()">发送</button>
    </div>
    <div class="chat-footer" onclick="closeChat()">关闭 ✕</div>
  </div>

  <!-- 备忘录面板 -->
  <div class="chat-panel" id="memo-panel" style="display:none">
    <div class="chat-title">📝 语音备忘录</div>
    <div class="chat-history" id="memo-history"></div>
    <button class="voice-btn" id="memo-btn"
      onmousedown="startVoice('memo')" onmouseup="stopVoice('memo')"
      ontouchstart="startVoice('memo')" ontouchend="stopVoice('memo')">
      🎤 按住说话，松开保存
    </button>
    <div class="chat-footer" onclick="closeMemo()">关闭 ✕</div>
  </div>

</div>

  if([80,81,82].includes(c))return'阵雨';if([95,96,99].includes(c))return'雷阵雨';return'多云';
}

// ── 绘制 ──
const rainDrops=Array.from({length:10},()=>({x:Math.random()*W,y:Math.random()*H,spd:1.5+Math.random()*2}));
const snowFlakes=Array.from({length:8},()=>({x:Math.random()*W,y:Math.random()*H,spd:0.5+Math.random(),sz:2+Math.random()*2}));
function draw(){
  const fn=ANIM[curMode].frames[frameIdx%ANIM[curMode].frames.length];
  const img=imgs[fn];if(!img.complete||!img.naturalWidth)return;
  ctx.clearRect(0,0,W,H);
  const s=Math.min(W/img.naturalWidth,H/img.naturalHeight);
  const dw=img.naturalWidth*s,dh=img.naturalHeight*s;
  const dx=(W-dw)/2,dy=(H-dh)/2;
  ctx.drawImage(img,dx,dy,dw,dh);
  if(weatherCode!==null)drawWeatherAccessory(getWeatherType(weatherCode),dx,dy,dw,dh);
}
function drawWeatherAccessory(type,px,py,pw,ph){
  const cx=px+pw/2,headTopY=py+ph*0.05,faceY=py+ph*0.18;
  ctx.save();
  if(type==='sunny'){drawSun(px+4,headTopY+2);drawSunglasses(cx,faceY,pw*0.48);}
  else if(type==='rainy'){drawUmbrella(cx,headTopY-4,pw*0.58);drawRaindrops();}
  else if(type==='cloudy'){drawCloud(cx+pw*0.22,headTopY-6);}
  else if(type==='snowy'){drawSnowflakes();drawScarf(cx,py+ph*0.32,pw*0.46);}
  else if(type==='foggy'){drawFog();drawMask(cx,faceY+2,pw*0.40);}
  ctx.restore();
}
function drawSun(x,y){ctx.save();ctx.fillStyle='#FFD700';ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*8,y+Math.sin(a)*8);ctx.lineTo(x+Math.cos(a)*12,y+Math.sin(a)*12);ctx.stroke();}ctx.restore();}
function drawSunglasses(cx,cy,w){const lx=cx-w*0.26,rx=cx+w*0.06,r=w*0.18;ctx.fillStyle='rgba(50,50,90,0.75)';ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(lx,cy,r,r*0.62,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(rx,cy,r,r*0.62,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='#555';ctx.beginPath();ctx.moveTo(lx+r,cy);ctx.lineTo(rx-r,cy);ctx.stroke();ctx.beginPath();ctx.moveTo(lx-r,cy);ctx.lineTo(lx-r-6,cy-2);ctx.stroke();ctx.beginPath();ctx.moveTo(rx+r,cy);ctx.lineTo(rx+r+6,cy-2);ctx.stroke();}
function drawUmbrella(cx,topY,size){const r=size/2;const grad=ctx.createRadialGradient(cx,topY+r*0.3,1,cx,topY+r*0.3,r);grad.addColorStop(0,'#ffb0cc');grad.addColorStop(1,'#e05888');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,topY+r*0.3,r,Math.PI,0);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=0.8;for(let i=0;i<=4;i++){const a=Math.PI+(i/4)*Math.PI;ctx.beginPath();ctx.moveTo(cx,topY+r*0.3);ctx.lineTo(cx+Math.cos(a)*r,topY+r*0.3+Math.sin(a)*r);ctx.stroke();}ctx.strokeStyle='#c06080';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,topY+r*0.3);ctx.lineTo(cx,topY+r*1.5);ctx.stroke();ctx.beginPath();ctx.arc(cx-3,topY+r*1.5,3,0,Math.PI);ctx.stroke();}
function drawRaindrops(){ctx.strokeStyle='rgba(100,160,220,0.5)';ctx.lineWidth=1;rainDrops.forEach(d=>{ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+6);ctx.stroke();d.y+=d.spd;if(d.y>H){d.y=0;d.x=Math.random()*W;}});}
function drawCloud(x,y){ctx.fillStyle='rgba(210,225,255,0.88)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.arc(x+10,y-3,10,0,Math.PI*2);ctx.arc(x+22,y,7,0,Math.PI*2);ctx.arc(x+12,y+5,8,0,Math.PI*2);ctx.fill();}
function drawSnowflakes(){ctx.fillStyle='rgba(190,215,255,0.82)';snowFlakes.forEach(f=>{ctx.beginPath();ctx.arc(f.x,f.y,f.sz,0,Math.PI*2);ctx.fill();f.y+=f.spd;f.x+=Math.sin(f.y*0.05)*0.5;if(f.y>H){f.y=0;f.x=Math.random()*W;}});}
function drawScarf(cx,cy,w){ctx.fillStyle='#ff7088';ctx.strokeStyle='#e05070';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(cx,cy,w/2,4,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#ff8098';ctx.fillRect(cx+w*0.18,cy,7,12);}
function drawMask(cx,cy,w){ctx.fillStyle='rgba(200,220,255,0.85)';ctx.strokeStyle='#aac0ee';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(cx,cy,w/2,w*0.28,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='rgba(150,170,220,0.55)';ctx.lineWidth=0.8;for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(cx-w/2+4,cy+i*4);ctx.lineTo(cx+w/2-4,cy+i*4);ctx.stroke();}}
function drawFog(){ctx.strokeStyle='rgba(200,200,200,0.28)';ctx.lineWidth=3;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(5,50+i*22);ctx.bezierCurveTo(40,45+i*22,100,55+i*22,W-5,50+i*22);ctx.stroke();}}

function friendlyElapsed(s,mode){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),icon=mode==='focus'?'📚':'🌿';
  if(s<60)return mode==='focus'?`${icon} 刚刚开始专注～`:`${icon} 刚刚开始放松～`;
  if(m<=5)return`${icon} 才刚刚开始，继续加油 💪`;
  if(m<=15)return`${icon} 已经坚持 ${m} 分钟啦`;
  if(m<=30)return`${icon} 专注了 ${m} 分钟，很棒！`;
  if(m<=45)return`${icon} 坚持了将近半小时，了不起 ✨`;
  if(h===0)return`${icon} 快一小时了，真厉害！`;
  if(m===0)return`${icon} 整整 ${h} 小时，超级棒！🎉`;
  return`${icon} 快 ${h+1} 小时了，真的很努力 💖`;
}
function tickDisplay(){
  if(timerStart!==null){
    const elapsed=Math.floor((Date.now()-timerStart)/1000);
    document.getElementById('timer').textContent=friendlyElapsed(elapsed,curMode);
    document.getElementById('timer').className='timer '+curMode;
    const hours=Math.floor(elapsed/3600);
    if(hours>0&&hours>lastHourNotif){
      lastHourNotif=hours;
      const hw=hours===1?'整整一个小时':hours+'个小时';
      showBubble(curMode==='focus'?`Jenny，专注了${hw}啦！\n快起来活动活动 🏃`:`Jenny，放松了${hw}咯 😊`,7000);
    }
  }

}

// ── 语音录音（修复：用 OfflineAudioContext 避免 AudioContext 挂起） ──
async function startVoice(target){
  if(isRecording)return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1}});
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.start(100);
    isRecording=true;
    const btnId=target==='chat'?'voice-btn':'memo-btn';
    const btn=document.getElementById(btnId);
    btn.textContent='🔴 录音中…松开发送';btn.classList.add('recording');
  }catch(e){showBubble('需要麦克风权限才能录音 🎤',3000);}
}

async function stopVoice(target){
  if(!isRecording||!mediaRecorder)return;
  isRecording=false;
  const btnId=target==='chat'?'voice-btn':'memo-btn';
  const btn=document.getElementById(btnId);
  btn.textContent=target==='chat'?'🎤 按住说话':'🎤 按住说话，松开保存';
  btn.classList.remove('recording');
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  await new Promise(r=>setTimeout(r,200)); // 等最后数据flush
  const blob=new Blob(audioChunks,{type:'audio/webm'});
  mediaRecorder=null;
  transcribeAudio(blob,target);
}

async function transcribeAudio(blob,target){
  const appendFn=target==='chat'?appendChatMsg:appendMemoMsg;
  appendFn('ai','🎤 正在识别…','asr-msg');
  try{
    const arrayBuf=await blob.arrayBuffer();

    // 用 OfflineAudioContext 解码并重采样，避免挂起
    const tmpCtx=new AudioContext();
    const decoded=await tmpCtx.decodeAudioData(arrayBuf);
    tmpCtx.close();

    const srcRate=decoded.sampleRate, targetRate=16000;
    const srcData=decoded.getChannelData(0);
    const ratio=srcRate/targetRate;
    const outLen=Math.floor(srcData.length/ratio);
    const pcm16=new Int16Array(outLen);
    for(let i=0;i<outLen;i++){
      const si=i*ratio,lo=Math.floor(si),hi=Math.min(lo+1,srcData.length-1);
      const v=srcData[lo]*(1-(si-lo))+srcData[hi]*(si-lo);
      pcm16[i]=Math.max(-32768,Math.min(32767,v*32768));
    }
    const bytes=new Uint8Array(pcm16.buffer);
    let binary='';const chunk=8192;
    for(let i=0;i<bytes.length;i+=chunk)binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));
    const base64=btoa(binary);

    // 讯飞鉴权
    const host='iat-api.xfyun.cn';
    const date=new Date().toUTCString();
    const signStr=`host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey('raw',enc.encode('Yjc4Yzc5YjFkYzg3MmJiYjkwYjViMDNl'),{name:'HMAC',hash:'SHA-256'},false,['sign']);
    const sig=await crypto.subtle.sign('HMAC',key,enc.encode(signStr));
    const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig)));
    const auth=btoa(`api_key="7bfc14e018a13b958b287af9c7d9ec89", algorithm="hmac-sha256", headers="host date request-line", signature="${sigB64}"`);
    const wsUrl=`wss://${host}/v2/iat?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${host}`;

    const ws=new WebSocket(wsUrl);let result='';
    ws.onopen=()=>{
      ws.send(JSON.stringify({
        common:{app_id:'cf5925fb'},
        business:{language:'zh_cn',domain:'iat',accent:'mandarin',vad_eos:2000},
        data:{status:0,format:'audio/L16;rate=16000',encoding:'raw',audio:base64}
      }));
      setTimeout(()=>ws.send(JSON.stringify({data:{status:2,format:'audio/L16;rate=16000',encoding:'raw',audio:''}})),200);
    };
    ws.onmessage=e=>{
      const d=JSON.parse(e.data);
      if(d.data?.result){(d.data.result.ws||[]).forEach(w=>w.cw.forEach(c=>{result+=c.w;}));}
      if(d.data?.status===2){
        ws.close();
        document.getElementById('asr-msg')?.remove();
        if(result.trim()){
          if(target==='chat')sendToAI(result.trim());
          else{appendMemoMsg('user',result.trim());writeMemo(result.trim());}
        } else {
          appendFn('ai','没听清楚，再说一次吧 🥺');
        }
      }
    };
    ws.onerror=()=>{document.getElementById('asr-msg')?.remove();appendFn('ai','语音识别失败，试试打字吧 😅');};
  }catch(e){
    console.error('transcribe error:',e);
    document.getElementById('asr-msg')?.remove();
    appendFn('ai','语音处理出错了 😅 错误：'+e.message);
  }
}

// ── 启动 ──
let loaded=0;
imgs.forEach(img=>{img.onload=()=>{if(++loaded===imgs.length){
  startAnim('focus');startTimer('focus');scheduleEncourage();requestAnimationFrame(tickDisplay);
  setTimeout(()=>showBubble('Jenny，嗨！点我选择今天的状态吧 😊'),800);
  fetchWeather();setInterval(fetchWeather,30*60*1000);
}};});

</script>
